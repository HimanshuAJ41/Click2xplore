<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="tQSO-hlmkxZWRxk9XcIQq6CB8_aC2bMr2IJEHPX6Lrc" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Click2Xplore - Explore the world with an interactive 3D globe experience">
    <title>Click2Xplore | Interactive 3D Globe Explorer</title>

    <!-- Cesium.js - 3D Globe Library -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2SYEH2392H"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-2SYEH2392H');
    </script>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader-container">
            <h2 class="loading-text">Initializing Globe...</h2>
            <p class="loading-sub">Preparing your exploration experience</p>
            <div class="loading-progress">
                <div class="loading-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Navigation Header -->
        <header class="header glass-effect">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" />
                        <ellipse cx="12" cy="12" rx="10" ry="4" stroke="currentColor" stroke-width="1.5" />
                        <path d="M12 2C12 2 8 6 8 12C8 18 12 22 12 22" stroke="currentColor" stroke-width="1.5" />
                        <path d="M12 2C12 2 16 6 16 12C16 18 12 22 12 22" stroke="currentColor" stroke-width="1.5" />
                    </svg>
                </div>
                <span class="logo-text">Click<span class="highlight">2</span>Xplore</span>
            </div>

            <!-- Desktop: view mode buttons -->
            <nav class="nav-menu desktop-only">
                <button class="nav-btn" data-view="globe">
                    <span class="nav-icon">🌍</span>Globe
                </button>
                <button class="nav-btn active" data-view="satellite">
                    <span class="nav-icon">🛰️</span>Satellite
                </button>
                <button class="nav-btn" data-view="Terrain"
                    title="Topo Terrain map — roads, peaks & contours (OpenTopoMap)">
                    <span class="nav-icon">🗺️</span>Terrain
                </button>
                <button class="nav-btn" data-view="street"
                    title="Shaded street map (Esri World Topo, similar to Google street)">
                    <span class="nav-icon">🏔️</span>Street
                </button>
            </nav>

            <div class="header-actions">
                <!-- Search (always visible) -->
                <div class="search-container">
                    <!-- Mobile: icon-only search toggle -->
                    <button id="search-toggle-btn" class="search-toggle-btn mobile-only" title="Search">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                            <path d="M16 16L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                    <!-- Search input (always on desktop, toggled on mobile) -->
                    <input type="text" id="search-input" class="search-input" placeholder="Search any location..."
                        autocomplete="off">
                    <button id="search-btn" class="search-btn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
                            <path d="M16 16L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </button>
                    <div id="search-suggestions" class="search-suggestions"></div>
                </div>

                <!-- Controls menu button (both desktop + mobile) -->
                <div class="controls-menu-wrap">
                    <button id="controls-menu-btn" class="controls-menu-btn" title="Map Controls">
                        <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                            <circle cx="12" cy="5" r="1.5" fill="currentColor" />
                            <circle cx="12" cy="12" r="1.5" fill="currentColor" />
                            <circle cx="12" cy="19" r="1.5" fill="currentColor" />
                        </svg>
                    </button>

                    <!-- Dropdown menu -->
                    <div id="controls-dropdown" class="controls-dropdown glass-effect">
                        <!-- View modes (mobile shows these here) -->
                        <div class="dropdown-section mobile-only">
                            <p class="dropdown-label">Map View</p>
                            <div class="dropdown-row dropdown-row-views">
                                <button class="ddown-btn" data-view="globe">🌍 Globe</button>
                                <button class="ddown-btn active" data-view="satellite">🛰️ Satellite</button>
                                <button class="ddown-btn" data-view="street">🗺️ Street</button>
                                <button class="ddown-btn" data-view="terrain">🏔️ Terrain</button>
                            </div>
                        </div>

                        <div class="dropdown-section mobile-only">
                            <p class="dropdown-label">Navigate</p>
                            <div class="dropdown-row">
                                <button class="ddown-icon-btn" id="dd-zoom-in" title="Zoom In">
                                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" />
                                    </svg>
                                    <span>In</span>
                                </button>
                                <button class="ddown-icon-btn" id="dd-zoom-out" title="Zoom Out">
                                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                                        <path d="M5 12H19" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" />
                                    </svg>
                                    <span>Out</span>
                                </button>
                                <button class="ddown-icon-btn" id="dd-rotate-left" title="Rotate Left">
                                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                                        <path d="M4 12C4 7.58172 7.58172 4 12 4C15.3181 4 18.1467 6.01217 19.3447 8.875"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                        <path d="M9 4L4 4L4 9" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <span>↺</span>
                                </button>
                                <button class="ddown-icon-btn" id="dd-rotate-right" title="Rotate Right">
                                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                                        <path
                                            d="M20 12C20 16.4183 16.4183 20 12 20C8.68187 20 5.85334 17.9878 4.65527 15.125"
                                            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                        <path d="M15 20L20 20L20 15" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <span>↻</span>
                                </button>
                                <button class="ddown-icon-btn" id="dd-reset-view" title="Reset View">
                                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                                        <path d="M12 8V12L15 14" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" />
                                    </svg>
                                    <span>Reset</span>
                                </button>
                                <button class="ddown-icon-btn my-location-style" id="dd-my-location"
                                    title="My Location">
                                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                                        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                                        <path d="M12 2V5M12 19V22M2 12H5M19 12H22" stroke="currentColor"
                                            stroke-width="2" stroke-linecap="round" />
                                    </svg>
                                    <span>Me</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>


        <!-- Globe Container -->
        <div id="cesiumContainer" class="globe-container"></div>

        <!-- Wonder Toast Notifications (replaces sidebar) -->
        <div id="wonder-toast-container" class="wonder-toast-container"></div>

        <!-- Controls Panel (desktop only — sidebar right) -->
        <div class="controls-panel glass-effect desktop-only">
            <button class="control-btn" id="zoom-in" title="Zoom In">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <button class="control-btn" id="zoom-out" title="Zoom Out">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="control-divider"></div>
            <button class="control-btn" id="rotate-left" title="Rotate Left">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 12C4 7.58172 7.58172 4 12 4C15.3181 4 18.1467 6.01217 19.3447 8.875"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M9 4L4 4L4 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <button class="control-btn" id="rotate-right" title="Rotate Right">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M20 12C20 16.4183 16.4183 20 12 20C8.68187 20 5.85334 17.9878 4.65527 15.125"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M15 20L20 20L20 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <div class="control-divider"></div>
            <button class="control-btn" id="reset-view" title="Reset View">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" />
                    <path d="M12 8V12L15 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="control-divider"></div>
            <button class="control-btn my-location-btn" id="my-location" title="My Location">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
                    <path d="M12 2V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M12 19V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M2 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M19 12H22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <!-- Detailed Location Info Panel -->
        <div class="detail-panel glass-effect" id="detail-panel">
            <div class="detail-header">
                <h3>Location Details</h3>
                <button class="close-btn" id="close-detail">×</button>
            </div>
            <div class="detail-content">
                <!-- Content will be dynamically populated -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer glass-effect">
            <div class="coordinates">
                <span>📍</span>
                <span id="live-location-name" class="location-name-live">Earth</span>
                <span class="coord-separator">|</span>
                <span id="live-coords">0.0000°, 0.0000°</span>
            </div>
            <div class="footer-info">
                <span class="footer-powered">Powered by Cesium.js</span>
                <span id="basemap-attrib" class="basemap-attrib" aria-live="polite"></span>
            </div>
        </footer>
    </div>

    <script src="info-panel.js"></script>
    <script src="navigation.js"></script>
    <script src="places-db.js"></script>
    <script src="admin-boundaries.js"></script>
    <script src="app.js"></script>

    <script>
        // ── Controls dropdown toggle ──────────────────────────────
        const menuBtn = document.getElementById('controls-menu-btn');
        const dropdown = document.getElementById('controls-dropdown');

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });
        document.addEventListener('click', () => dropdown.classList.remove('open'));
        dropdown.addEventListener('click', e => e.stopPropagation());

        // ── Mobile search toggle ──────────────────────────────────
        const searchToggle = document.getElementById('search-toggle-btn');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        if (searchToggle) {
            searchToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = searchInput.classList.toggle('search-open');
                searchBtn.classList.toggle('search-open', isOpen);
                // ★ FIX: Hide toggle icon when search is open to prevent duplicate icons
                searchToggle.classList.toggle('hidden-search-toggle', isOpen);
                if (isOpen) {
                    searchInput.focus();
                }
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    searchInput.classList.remove('search-open');
                    searchBtn.classList.remove('search-open');
                    searchToggle.classList.remove('hidden-search-toggle');
                }
            });
        }

        // ── Dropdown view buttons (mobile) ────────────────────────
        document.querySelectorAll('.ddown-btn[data-view]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ddown-btn[data-view]').forEach(b => b.classList.remove('active'));
                // Also sync desktop nav-btn
                document.querySelectorAll('.nav-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.view === btn.dataset.view);
                });
                btn.classList.add('active');
                if (typeof changeView === 'function') changeView(btn.dataset.view);
                dropdown.classList.remove('open');
            });
        });

        // ── Dropdown control buttons (direct action — no dependency on hidden desktop panel) ──
        function bindDD(ddId, realId) {
            const ddBtn = document.getElementById(ddId);
            const realBtn = document.getElementById(realId);
            if (ddBtn && realBtn) {
                ddBtn.addEventListener('click', () => {
                    realBtn.click();
                    dropdown.classList.remove('open');
                });
            } else if (ddBtn) {
                // Fallback: if desktop button is missing/hidden, fire action directly
                ddBtn.addEventListener('click', () => {
                    dropdown.classList.remove('open');
                });
            }
        }
        bindDD('dd-zoom-in', 'zoom-in');
        bindDD('dd-zoom-out', 'zoom-out');
        bindDD('dd-rotate-left', 'rotate-left');
        bindDD('dd-rotate-right', 'rotate-right');
        bindDD('dd-reset-view', 'reset-view');
        bindDD('dd-my-location', 'my-location');
    </script>
</body>

</html>
